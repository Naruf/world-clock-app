    <header>
      <h1>Nadia's world clock</h1>
    </header>
    <main>
      <section>
        <h2>Malaga</h2>
        <p>current time in Malaga</p>
        <form action="">
          <select name="city" id="city">
            <option valeu="">Select a city</option>
            <option valeu="">Madrid</option>
            <option valeu="">London</option>
            <option valeu="">Paris</option>
            <option valeu="">Rome</option>
          </select>
        </form>
        <div>
          <h3>Madrid <span>Time</span></h3>
        </div>
        <div>
          <h3>London <span>Time</span></h3>
        </div>
        <div>
          <h3>Paris <span>Time</span></h3>
        </div>
        <div>
          <h3>Rome <span>Time</span></h3>
        </div>
      </section>
    </main>
